name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} · Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile Python entry points
        run: python -m py_compile scripts/vaultlib.py scripts/sb.py .codex/hooks/codex_hook.py

      - name: Run regression tests
        run: python -m unittest discover -s tests -v

      - name: Validate vault
        run: python scripts/sb.py validate

      - name: Check shared instructions
        run: python scripts/sb.py instruction-sync

      - name: Check immutable sources
        run: python scripts/sb.py sources
